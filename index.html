<!DOCTYPE html>

<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Jogo da Turma</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    #loginBox,
    #panel {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
      width: 100%;
    }

    hr {
      margin: 20px 0;
    }

    #status {
      color: green;
    }
  </style>

</head>

<body>

  <h1 style="text-align:center;">Jogo da Turma</h1>

  <!-- LOGIN -->

  <div id="loginBox">

```
<h3>Login</h3>

<input
  id="nickname"
  type="text"
  placeholder="Nickname"
  autocomplete="off">

<input
  id="password"
  type="password"
  placeholder="Senha"
  autocomplete="off">

<button onclick="login()">
  Entrar
</button>
```

  </div>

  <!-- PAINEL -->

  <div id="panel" style="display:none;">

```
<h3 id="status">
  Logado ✔
</h3>

<button onclick="logout()">
  Sair
</button>

<hr>

<div id="menu">

  <button onclick="openMinecraft()">
    Abrir Minecraft 1.8.8
  </button>

  <button onclick="saveWorld()">
    Salvar Mundo
  </button>

  <button onclick="loadWorld()">
    Carregar Mundo
  </button>

</div>

<div id="gameArea"></div>
```

  </div>

  <script src="login.js"></script>

  <script src="app.js"></script>

</body>
</html>
