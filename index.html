<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Jogo da Turma</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    #loginBox, #panel {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
    }

    #gameArea iframe {
      border-radius: 8px;
    }
  </style>

</head>

<body>

  <h1 style="text-align:center;">Jogo da Turma</h1>

  <!-- LOGIN -->
  <div id="loginBox">
    <h3>Login</h3>

    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="senha">

    <button onclick="login()">Entrar</button>
  </div>

  <!-- PAINEL -->
  <div id="panel" style="display:none;">

    <h3 id="status">Logado ✔</h3>

    <button onclick="logout()">Sair</button>

    <hr>

    <!-- MENU -->
    <div id="menu">
      <button onclick="openMinecraft()">Abrir Minecraft</button>
      <button onclick="saveWorld()">Salvar mundo</button>
      <button onclick="loadWorld()">Carregar mundo</button>
    </div>

    <!-- JOGO -->
    <div id="gameArea"></div>

  </div>

  <!-- SCRIPTS -->
  <script src="login.js"></script>
  <script src="app.js"></script>

</body>

</html>
