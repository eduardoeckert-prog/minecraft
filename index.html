<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jogo da Turma</title>
</head>

<body>

<h1>Jogo da Turma</h1>

<div id="loginBox">
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none;">

  <h3>Logado ✔</h3>

  <button onclick="openMinecraft()">Abrir Minecraft</button>
  <button onclick="saveWorld()">Salvar mundo</button>
  <button onclick="loadWorld()">Carregar mundo</button>

  <p id="status"></p>

</div>

<script src="login.js"></script>
<script src="app.js"></script>

</body>
</html>
