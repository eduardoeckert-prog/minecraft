<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jogo da Turma</title>
</head>

<body>

<h1>Jogo da Turma</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL DO JOGO -->
<div id="panel" style="display:none;">

  <h3 id="status">Logado ✔</h3>

  <!-- MENU -->
  <div id="menu">

    <button onclick="openMinecraft()">Abrir Minecraft</button>
    <button onclick="saveWorld()">Salvar mundo</button>
    <button onclick="loadWorld()">Carregar mundo</button>

  </div>

  <!-- AQUI VAI O MINECRAFT -->
  <div id="gameArea"></div>

</div>

<script src="login.js"></script>
<script src="app.js"></script>

</body>
</html>
